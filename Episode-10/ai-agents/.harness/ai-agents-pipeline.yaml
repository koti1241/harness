# ============================================
# PIPELINE: AI-Powered Enterprise CI/CD (Episode 10)
# ============================================
# AI Agents automate what humans do manually:
#   - security_agent.py → Reads scan results → generates security report
#   - deployment_risk_agent.py → Decides if deployment is safe
#   - code_review_agent.py → Reviews code changes for bugs/security
#   - log_analysis_agent.py → Analyzes pipeline logs for issues
#
# SECRETS NEEDED:
#   - openai_api_key OR gemini_api_key → PROJECT level (for AI provider)
#   - aws_access_key_id → PROJECT level (Episode 3)
#   - aws_secret_access_key → PROJECT level (Episode 3)
# ============================================
pipeline:
  name: ai-agents-enterprise-pipeline
  identifier: ai_agents_enterprise_pipeline
  projectIdentifier: HarnessCICDZerotoHero
  orgIdentifier: default
  tags: {}
  properties:
    ci:
      codebase:
        connectorRef: account.Github
        repoName: Harness-CI-CD-Zero-to-Hero
        build: <+input>
  variables:
    - name: environment
      type: String
      value: <+input>.allowedValues(development,testing,staging,production)
  stages:
    # ============================================
    # STAGE 1: Build + Security Scan (Same as Episode 5)
    # ============================================
    - stage:
        name: build-and-scan
        identifier: build_and_scan
        type: CI
        spec:
          cloneCodebase: true
          caching:
            enabled: true
            paths:
              - Episode-05/node-project/node_modules
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  type: Run
                  name: Install and Test
                  identifier: install_test
                  spec:
                    shell: Sh
                    command: |-
                      echo "=== Install + Test ==="
                      cd Episode-05/node-project
                      npm ci
                      npx jest --coverage --forceExit || true
                      echo "=== Done! ==="

              - parallel:
                  - step:
                      type: Run
                      name: Gitleaks Scan
                      identifier: gitleaks
                      spec:
                        shell: Sh
                        image: zricethezav/gitleaks:latest
                        command: |-
                          gitleaks detect --source=/harness --no-git --report-format json --report-path /harness/gitleaks-report.json || true
                          echo "Gitleaks scan done"

                  - step:
                      type: Run
                      name: Trivy Scan
                      identifier: trivy
                      spec:
                        shell: Sh
                        command: |-
                          cd Episode-05/node-project
                          docker build -t app:scan . 2>/dev/null || true
                          docker run --rm aquasec/trivy:latest image --format json --output /dev/stdout app:scan > /harness/trivy-results.json 2>/dev/null || true
                          echo "Trivy scan done"

                  - step:
                      type: Run
                      name: npm Audit
                      identifier: npm_audit
                      spec:
                        shell: Sh
                        command: |-
                          cd Episode-05/node-project
                          npm audit --json > /harness/npm-audit.json 2>/dev/null || true
                          echo "npm audit done"

    # ============================================
    # STAGE 2: AI Security Agent (Analyzes all scan results)
    # ============================================
    - stage:
        name: ai-security-analysis
        identifier: ai_security_analysis
        description: "AI agent reads scan results and generates security report"
        type: CI
        spec:
          cloneCodebase: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  type: Run
                  name: AI Security Agent
                  identifier: ai_security_agent
                  spec:
                    shell: Sh
                    image: python:3.11-slim
                    envVariables:
                      # CHANGE THIS: Use your AI API key (OpenAI or Gemini)
                      OPENAI_API_KEY: <+secrets.getValue("openai_api_key")>
                      # OR use Gemini:
                      # GEMINI_API_KEY: <+secrets.getValue("gemini_api_key")>
                    command: |-
                      echo "=== 🛡️ AI Security Agent Starting ==="
                      cd Episode-10/ai-agents
                      python security_agent.py \
                        --trivy /harness/trivy-results.json \
                        --gitleaks /harness/gitleaks-report.json \
                        --npm-audit /harness/npm-audit.json
                      echo "=== Security Agent Done ==="

    # ============================================
    # STAGE 3: AI Code Review Agent
    # ============================================
    - stage:
        name: ai-code-review
        identifier: ai_code_review
        description: "AI agent reviews code changes for bugs and security"
        type: CI
        spec:
          cloneCodebase: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  type: Run
                  name: AI Code Review Agent
                  identifier: ai_code_review_agent
                  spec:
                    shell: Sh
                    image: python:3.11-slim
                    envVariables:
                      OPENAI_API_KEY: <+secrets.getValue("openai_api_key")>
                    command: |-
                      echo "=== 🔍 AI Code Review Agent Starting ==="
                      cd Episode-10/ai-agents

                      # Get git diff of recent changes
                      apt-get update -qq && apt-get install -y -qq git > /dev/null 2>&1
                      cd /harness
                      git diff HEAD~1 > /tmp/changes.diff 2>/dev/null || echo "No diff available" > /tmp/changes.diff

                      cd Episode-10/ai-agents
                      python code_review_agent.py --diff /tmp/changes.diff
                      echo "=== Code Review Done ==="

    # ============================================
    # STAGE 4: AI Deployment Risk Agent
    # ============================================
    - stage:
        name: ai-deployment-risk
        identifier: ai_deployment_risk
        description: "AI agent assesses if deployment is safe"
        type: CI
        spec:
          cloneCodebase: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  type: Run
                  name: AI Deployment Risk Agent
                  identifier: ai_risk_agent
                  spec:
                    shell: Sh
                    image: python:3.11-slim
                    envVariables:
                      OPENAI_API_KEY: <+secrets.getValue("openai_api_key")>
                    command: |-
                      echo "=== 🎯 AI Deployment Risk Agent Starting ==="
                      cd Episode-10/ai-agents
                      python deployment_risk_agent.py \
                        --environment <+pipeline.variables.environment> \
                        --test-status passed \
                        --security-status passed \
                        --changes 5 \
                        --trivy-critical 0 \
                        --secrets-found 0
                      echo "=== Risk Assessment Done ==="

    # ============================================
    # STAGE 5: Deploy (only if AI says safe)
    # ============================================
    - stage:
        name: deploy
        identifier: deploy
        description: "Push to ECR (AI approved)"
        type: CI
        spec:
          cloneCodebase: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  type: Run
                  name: Create ECR Repo
                  identifier: create_ecr
                  spec:
                    shell: Sh
                    image: amazon/aws-cli:latest
                    envVariables:
                      AWS_ACCESS_KEY_ID: <+secrets.getValue("aws_access_key_id")>
                      AWS_SECRET_ACCESS_KEY: <+secrets.getValue("aws_secret_access_key")>
                      AWS_DEFAULT_REGION: us-east-1
                    command: |-
                      aws ecr create-repository --repository-name ai-enterprise-app --region us-east-1 2>/dev/null || echo "Exists"

              - step:
                  type: BuildAndPushECR
                  name: Push to ECR
                  identifier: push_ecr
                  spec:
                    connectorRef: account.aws_account
                    region: us-east-1
                    account: <+variable.aws_account_id>
                    imageName: ai-enterprise-app
                    tags:
                      - <+pipeline.sequenceId>
                      - latest
                    dockerfile: Episode-05/node-project/Dockerfile
                    context: Episode-05/node-project

              - step:
                  type: Run
                  name: Pipeline Complete
                  identifier: complete
                  spec:
                    shell: Sh
                    command: |-
                      echo "=============================================="
                      echo "  🤖 AI-POWERED ENTERPRISE PIPELINE COMPLETE!"
                      echo "=============================================="
                      echo ""
                      echo "  AI Agents Used:"
                      echo "    🛡️  Security Agent → Analyzed vulnerabilities"
                      echo "    🔍 Code Review Agent → Reviewed changes"
                      echo "    🎯 Risk Agent → Approved deployment"
                      echo ""
                      echo "  Result: DEPLOYED TO ECR ✅"
                      echo "=============================================="
